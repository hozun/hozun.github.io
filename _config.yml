title: hozun
description: "Personal blog"
url: "https://hozun.github.io"
baseurl: ""
author: hozun

timezone: Asia/Seoul

markdown: kramdown
highlighter: rouge
permalink: /:year/:month/:day/:title/

kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: "highlight"
    block:
      line_numbers: false

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

collections:
  tags:
    output: true
    permalink: /tags/:name/

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: "_tags"
    values:
      layout: "tag"

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - .gitignore
