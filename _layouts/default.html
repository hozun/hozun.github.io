<!DOCTYPE html>
<html lang="ko">
<head>
  {% include head.html %}
</head>
<body>
  <header>
    <div class="container">
      {% include nav.html %}
    </div>
  </header>
  <main class="container">
    {{ content }}
  </main>
  <footer class="container">
    <p class="footer-text">&copy; {{ site.time | date: "%Y" }} {{ site.author }}</p>
  </footer>
  {% if page.mermaid %}
  <script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
    mermaid.initialize({
      startOnLoad: true,
      theme: 'default',
      themeVariables: { fontFamily: '"Noto Sans KR", sans-serif' }
    });
  </script>
  {% endif %}
</body>
</html>
